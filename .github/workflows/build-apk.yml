name: Build Android APK

# Manual on main; auto-build for cursor/* feature branches so test APKs
# are available while iterating. Trigger anytime via Actions → Run workflow.
on:
  workflow_dispatch:
  push:
    branches: ["cursor/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos

      - run: flutter test

      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expiry-check-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
