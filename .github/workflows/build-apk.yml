name: Build Android APK / AAB

# Auto-build on cursor/* test branches; manual via Actions → Run workflow anytime.
on:
  push:
    branches:
      - "cursor/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - run: flutter test

      - name: Decode upload keystore (optional Play signing)
        env:
          PLAY_UPLOAD_KEYSTORE_BASE64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
          PLAY_KEY_PROPERTIES: ${{ secrets.PLAY_KEY_PROPERTIES }}
        run: |
          if [ -z "${PLAY_UPLOAD_KEYSTORE_BASE64:-}" ]; then
            echo "No PLAY_UPLOAD_KEYSTORE_BASE64 secret — building with debug signing."
            exit 0
          fi
          mkdir -p android/keystore
          echo "$PLAY_UPLOAD_KEYSTORE_BASE64" | base64 -d > android/keystore/upload-keystore.jks
          printf '%s\n' "$PLAY_KEY_PROPERTIES" > android/key.properties
          echo "Upload keystore restored for Play-signed builds."

      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expiry-check-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build Play App Bundle
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: expiry-check-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
